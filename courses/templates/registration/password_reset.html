{% extends "base.html" %}

{% block title %}
Forgot Password | SkillSprings
{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-5">

            <div class="login-card">

                <h2 class="login-title text-center mb-4">

                    Reset Password

                </h2>

                <form method="post">

                    {% csrf_token %}

                    <div class="mb-4">

                        <input type="email"
                               name="email"
                               class="premium-input"
                               placeholder="Enter registered email"
                               required>

                    </div>

                    <button class="btn premium-login-btn w-100">

                        Send Reset Link

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
```
