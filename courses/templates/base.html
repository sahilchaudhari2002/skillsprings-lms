<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SkillSpring{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --brand: #0f766e;
            --brand-dark: #134e4a;
            --accent: #f59e0b;
            --bg: #f5f7f4;
            --card: #ffffff;
            --text: #102a43;
            --muted: #5c6b7a;
        }

        body {
            background:
                radial-gradient(circle at top right, rgba(245, 158, 11, 0.12), transparent 22%),
                linear-gradient(180deg, #f8fbf9 0%, var(--bg) 100%);
            color: var(--text);
        }

        .navbar-brand,
        .brand-text {
            font-weight: 700;
            letter-spacing: 0.04em;
        }

        .btn-brand {
            background: var(--brand);
            border-color: var(--brand);
            color: #fff;
        }

        .btn-brand:hover,
        .btn-brand:focus {
            background: var(--brand-dark);
            border-color: var(--brand-dark);
            color: #fff;
        }

        .surface-card {
            background: var(--card);
            border: 0;
            border-radius: 22px;
            box-shadow: 0 18px 40px rgba(16, 42, 67, 0.08);
        }

        .section-title {
            font-weight: 700;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    

    <main class="container py-4">
        {% if messages %}
            <div class="mb-3">
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags|default:'info' }} mb-2">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>
</html>
