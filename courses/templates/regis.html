{% extends "base.html" %}

{% block title %}Register | SkillSpring{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="surface-card p-4 p-lg-5">
            <h1 class="h3 mb-3">Create your account</h1>
            <p class="text-muted">Sign up to buy courses, watch videos, take quizzes, and download certificates.</p>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password1" class="form-control" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Confirm password</label>
                    <input type="password" name="password2" class="form-control" required>
                </div>
                <button class="btn btn-brand w-100">Register</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
