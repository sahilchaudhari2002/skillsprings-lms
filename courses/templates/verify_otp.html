```html
{% extends "base.html" %}

{% block content %}

<style>

    body{

        margin:0;
        padding:0;

        background:#020617;

        overflow-x:hidden;
    }

    .otp-section{

        min-height:100vh;

        display:flex;
        align-items:center;
        justify-content:center;

        position:relative;

        overflow:hidden;

        padding:40px 20px;
    }

    /* Animated Background */

    .otp-section::before{

        content:"";

        position:absolute;

        width:700px;
        height:700px;

        background:
        radial-gradient(
            circle,
            rgba(59,130,246,0.35),
            transparent 70%
        );

        top:-200px;
        left:-200px;

        animation:float1 10s infinite alternate;
    }

    .otp-section::after{

        content:"";

        position:absolute;

        width:600px;
        height:600px;

        background:
        radial-gradient(
            circle,
            rgba(16,185,129,0.28),
            transparent 70%
        );

        bottom:-180px;
        right:-180px;

        animation:float2 10s infinite alternate;
    }

    @keyframes float1{

        from{
            transform:translateY(0px);
        }

        to{
            transform:translateY(40px);
        }
    }

    @keyframes float2{

        from{
            transform:translateY(0px);
        }

        to{
            transform:translateY(-40px);
        }
    }

    .glass-card{

        width:100%;
        max-width:520px;

        position:relative;
        z-index:10;

        background:
        rgba(255,255,255,0.08);

        border:
        1px solid rgba(255,255,255,0.12);

        backdrop-filter:blur(20px);

        border-radius:35px;

        padding:50px 40px;

        box-shadow:
        0 25px 80px rgba(0,0,0,0.45);

        overflow:hidden;
    }

    .live-badge{

        position:absolute;

        top:25px;
        right:25px;

        background:
        rgba(34,197,94,0.15);

        color:#4ade80;

        border:
        1px solid rgba(74,222,128,0.30);

        padding:8px 14px;

        border-radius:50px;

        font-size:13px;

        font-weight:700;

        display:flex;
        align-items:center;
        gap:8px;
    }

    .live-dot{

        width:10px;
        height:10px;

        background:#22c55e;

        border-radius:50%;

        animation:pulse 1s infinite;
    }

    @keyframes pulse{

        0%{
            transform:scale(1);
            opacity:1;
        }

        100%{
            transform:scale(1.8);
            opacity:0;
        }
    }

    .logo-box{

        width:100px;
        height:100px;

        margin:auto;

        border-radius:30px;

        background:
        linear-gradient(
            135deg,
            #2563eb,
            #14b8a6
        );

        display:flex;
        align-items:center;
        justify-content:center;

        box-shadow:
        0 15px 45px rgba(37,99,235,0.45);

        transform:rotate(-8deg);

        animation:floatLogo 4s ease-in-out infinite;
    }

    @keyframes floatLogo{

        0%{
            transform:translateY(0px) rotate(-8deg);
        }

        50%{
            transform:translateY(-12px) rotate(-8deg);
        }

        100%{
            transform:translateY(0px) rotate(-8deg);
        }
    }

    .logo-box i{

        font-size:46px;

        color:white;
    }

    .main-title{

        margin-top:30px;

        text-align:center;

        font-size:38px;

        font-weight:900;

        color:white;
    }

    .gradient-text{

        background:
        linear-gradient(
            135deg,
            #38bdf8,
            #22c55e
        );

        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
    }

    .sub-title{

        text-align:center;

        color:rgba(255,255,255,0.72);

        margin-top:15px;

        margin-bottom:35px;

        font-size:15px;
    }

    .otp-input{

        height:65px;

        border-radius:20px;

        background:
        rgba(255,255,255,0.10);

        border:
        1px solid rgba(255,255,255,0.12);

        color:white;

        font-size:22px;

        text-align:center;

        letter-spacing:8px;

        font-weight:700;
    }

    .otp-input::placeholder{

        color:rgba(255,255,255,0.45);

        letter-spacing:2px;
    }

    .otp-input:focus{

        background:
        rgba(255,255,255,0.14);

        color:white;

        border:
        1px solid rgba(56,189,248,0.45);

        box-shadow:
        0 0 20px rgba(56,189,248,0.18);
    }

    .verify-btn{

        height:62px;

        border:none;

        border-radius:18px;

        background:
        linear-gradient(
            135deg,
            #22c55e,
            #14b8a6
        );

        color:white;

        font-size:16px;

        font-weight:800;

        transition:0.4s;
    }

    .verify-btn:hover{

        transform:translateY(-4px);

        box-shadow:
        0 18px 40px rgba(34,197,94,0.30);
    }

    .back-btn{

        display:inline-flex;

        align-items:center;

        gap:10px;

        text-decoration:none;

        color:#cbd5e1;

        font-weight:600;

        margin-bottom:25px;

        transition:0.3s;
    }

    .back-btn:hover{

        color:white;

        transform:translateX(-4px);
    }

    .alert{

        border-radius:16px;

        border:none;
    }

    .bottom-text{

        text-align:center;

        margin-top:30px;

        color:rgba(255,255,255,0.55);

        font-size:13px;
    }

    @media(max-width:576px){

        .glass-card{
            padding:40px 25px;
        }

        .main-title{
            font-size:30px;
        }
    }

</style>

<section class="otp-section">

    <div class="glass-card">

        <div class="live-badge">

            <span class="live-dot"></span>

            OTP ACTIVE

        </div>

        <a href="{% url 'forgot_password' %}" class="back-btn">

            <i class="bi bi-arrow-left"></i>

            Back

        </a>

        <div class="logo-box">

            <i class="bi bi-shield-check"></i>

        </div>

        <h1 class="main-title">

            Verify
            <span class="gradient-text">
                OTP
            </span>

        </h1>

        <p class="sub-title">

            Enter the secure verification code sent to your email

        </p>

        {% for message in messages %}

            <div class="alert alert-danger">

                {{ message }}

            </div>

        {% endfor %}

        <form method="POST">

            {% csrf_token %}

            <div class="mb-4">

                <input
                    type="text"
                    name="otp"
                    class="form-control otp-input"
                    placeholder="••••••"
                    required
                >

            </div>

            <button class="btn verify-btn w-100">

                Verify OTP

            </button>

        </form>

        <div class="bottom-text">

            Protected by SkillSprings live security verification

        </div>

    </div>

</section>

{% endblock %}
```
