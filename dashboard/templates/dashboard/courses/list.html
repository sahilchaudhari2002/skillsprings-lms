{% extends "dashboard/base.html" %}

{% block content %}

<div class="container-fluid py-4">

    <div class="d-flex justify-content-between mb-4">

        <h2 class="text-white">

            Courses

        </h2>

        <a
            href="{% url 'dashboard_course_create' %}"
            class="btn btn-primary"
        >

            Add Course

        </a>

    </div>

    <div class="card bg-dark border-0 shadow-lg">

        <div class="card-body">

            <table class="table table-dark table-hover">

                <thead>

                    <tr>

                        <th>ID</th>

                        <th>Title</th>

                        <th>Price</th>

                        <th>Actions</th>

                    </tr>

                </thead>

                <tbody>

                    {% for course in courses %}

                    <tr>

                        <td>

                            {{ course.id }}

                        </td>

                        <td>

                            {{ course.title }}

                        </td>

                        <td>

                            ₹{{ course.price }}

                        </td>

                        <td>

                            <a
                                href="{% url 'dashboard_course_edit' course.id %}"
                                class="btn btn-warning btn-sm"
                            >

                                Edit

                            </a>

                            <a
                                href="{% url 'dashboard_course_delete' course.id %}"
                                class="btn btn-danger btn-sm"
                            >

                                Delete

                            </a>

                        </td>

                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

{% endblock %}
